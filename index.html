<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tesla Launcher</title>
    <style>
        :root {
            --bg: #0F0F0F;
            --card: #1A1A1A;
            --accent: #E82127;
            --text: #FFFFFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
        }
        header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .search {
            flex: 1;
            padding: 16px 20px;
            background: #252525;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .tile {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.2s ease;
            border: 1px solid #333;
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .tile:active {
            transform: scale(0.98);
            border-color: var(--accent);
        }
        .emoji { font-size: 42px; display: block; margin-bottom: 8px; }
        .tile h2 { font-size: 22px; margin-bottom: 8px; }
        .tile p { opacity: 0.8; font-size: 15px; line-height: 1.4; }
        .home-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 20px rgba(232, 33, 39, 0.4);
            z-index: 1000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <h1 style="font-size:28px;">Tesla Launcher</h1>
        <input type="text" id="search" class="search" placeholder="Search tools and sites...">
    </header>

    <div class="grid" id="tiles"></div>

    <a href="#" class="home-btn" onclick="window.location.reload(); return false;">🏠</a>

    <script>
        const categories = [
            { emoji: "🌤", title: "Dashboard", desc: "Weather, Traffic, Gas, AQHI", url: "https://weather.gc.ca/" },
            { emoji: "🤖", title: "AI Tools", desc: "Claude, ChatGPT, Grok, Gemini", url: "https://claude.ai/" },
            { emoji: "⚕", title: "Clinical", desc: "Medical resources & calculators", url: "https://www.rxfiles.ca/" },
            { emoji: "🧮", title: "Tools", desc: "Calculators, Converter, Timer", url: "https://www.desmos.com/scientific" },
            { emoji: "📍", title: "Local & EV", desc: "ABRP, PlugShare, DriveBC", url: "https://abetterrouteplanner.com/" },
            { emoji: "🎵", title: "Media", desc: "Spotify, YouTube Music", url: "https://open.spotify.com/" }
        ];

        const container = document.getElementById('tiles');
        const searchInput = document.getElementById('search');

        function renderTiles(filtered) {
            container.innerHTML = '';
            filtered.forEach(cat => {
                const tile = document.createElement('a');
                tile.className = 'tile';
                tile.href = cat.url;
                tile.target = '_blank';
                tile.innerHTML = `
                    <span class="emoji">${cat.emoji}</span>
                    <h2>${cat.title}</h2>
                    <p>${cat.desc}</p>
                `;
                container.appendChild(tile);
            });
        }

        renderTiles(categories);

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase().trim();
            const filtered = categories.filter(c => 
                c.title.toLowerCase().includes(term) || c.desc.toLowerCase().includes(term)
            );
            renderTiles(filtered.length ? filtered : categories);
        });
    </script>
</body>
</html>
