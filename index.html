<!DOCTYPE html>
<!-- Updated: 2026-06-24 Professional Polish v3 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="description" content="Personal dashboard: live news, scores, messaging, streaming and learning tools.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000; --bg2: #0a0a0c;
  --surface: rgba(255,255,255,0.05); --surface2: rgba(255,255,255,0.08);
  --glass: rgba(20,20,24,0.6); --glass2: rgba(25,25,30,0.7);
  --glass-hover: rgba(30,30,36,0.75);
  --line: rgba(255,255,255,0.08); --line2: rgba(255,255,255,0.15);
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 12px rgba(0,0,0,0.15);
  --shadow-xs: 0 2px 8px rgba(0,0,0,0.2);
  --t1: #fff; --t2: #a1a1a6; --t3: #6e6e73;
  --accent: #3a82f6;
  --red: #ff453a; --red-bg: rgba(255,69,58,0.15); --green: #32d74b;
  --r: 24px;
  --f: 'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
html.light{
  --bg:#f2f2f7; --bg2:#fff;
  --surface:rgba(0,0,0,.04); --surface2:rgba(0,0,0,.08);
  --glass:rgba(255,255,255,.78); --glass2:rgba(255,255,255,.9);
  --line:rgba(0,0,0,.1); --line2:rgba(0,0,0,.16);
  --t1:#1d1d1f; --t2:#6e6e73; --t3:#8e8e93;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:var(--f);color:var(--t1);min-height:100vh;overflow:hidden;background:linear-gradient(180deg,var(--bg),var(--bg2));display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
a{color:inherit;text-decoration:none}
button{font-family:var(--f);cursor:pointer;border:none;background:none}
button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* HEADER */
#header{display:flex;justify-content:space-between;align-items:center;padding:16px 40px;height:90px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--line);box-shadow:var(--shadow-sm);transition:all .3s cubic-bezier(.34,.69,.66,1)}
#s-left,#s-right{display:flex;align-items:center;gap:20px}
.tesla-logo{width:30px;height:32px;fill:var(--t1)}
#s-time{font-size:36px;font-weight:500;letter-spacing:-.5px;font-variant-numeric:tabular-nums}
#s-date{font-size:18px;color:var(--t2);font-weight:500}
#weather-widget{font-size:26px;font-weight:500;display:flex;align-items:center;gap:12px}
.w-temp{color:var(--t1)}.w-icon{font-size:32px}
#stock-widget{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:600;padding-right:20px;border-right:1px solid var(--line2)}
#stock-widget .stk-label{color:var(--t2);font-size:15px}

/* MAIN */
#main{flex:1;padding:10px 40px 140px;overflow-y:auto;scroll-behavior:smooth}
#main::-webkit-scrollbar{width:8px}
#main::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.panel{display:none;animation:fadeUp .3s ease forwards}
.panel.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}

/* DOCK */
#dock{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:12px 18px;background:var(--glass);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:100px;border:1px solid var(--line);box-shadow:var(--shadow);z-index:200;max-width:calc(100% - 24px);overflow-x:auto;scrollbar-width:none;transition:all .3s cubic-bezier(.34,.69,.66,1)}
#dock::-webkit-scrollbar{display:none}
.dock-btn{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:100px;color:var(--t2);font-size:15px;font-weight:500;transition:all .25s cubic-bezier(.34,.69,.66,1);white-space:nowrap;cursor:grab;background:transparent;user-select:none}
.dock-btn:hover{background:var(--surface);color:var(--t1);transform:translateY(-2px)}
.dock-btn.on{background:var(--t1);color:var(--bg);box-shadow:0 6px 20px rgba(255,255,255,.15)}
.dock-btn:active{cursor:grabbing}
.dock-btn.drag-over{opacity:0.5;transform:scale(0.95)}
.dock-sep{width:1px;height:24px;background:var(--line);margin:0 4px;opacity:0.6}

/* COMPONENTS */
.sec-title{font-size:13px;text-transform:uppercase;letter-spacing:.8px;font-weight:700;color:var(--t3);margin:0 0 18px 4px;display:flex;align-items:center;gap:12px;opacity:.85}
.cardgroup{background:var(--glass2);border-radius:var(--r);border:1px solid var(--line);overflow:hidden;margin-bottom:32px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow-sm);transition:all .3s cubic-bezier(.34,.69,.66,1)}
.row{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line);gap:16px;transition:all .2s cubic-bezier(.34,.69,.66,1);min-height:70px;cursor:pointer}
.row:last-child{border-bottom:none}
.row:hover{background:var(--glass-hover)}
.row:active{background:var(--surface2);transform:scale(.98)}
.appicon{width:56px;height:56px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.appicon svg{width:32px;height:32px;display:block}

.ic-wa{background:linear-gradient(150deg,#2af34f,#0fa362)}
.ic-tg{background:linear-gradient(150deg,#3ec6ff,#0d83c4)}
.ic-ms{background:linear-gradient(150deg,#00c6ff,#9a3df0)}
.ic-gm{background:linear-gradient(150deg,#fff,#f1f3f6)}
.ic-notes{background:#fff}
.ic-remind{background:#fff}
.ic-drive{background:linear-gradient(150deg,#70D4FF,#0A7AFF)}
.ic-photos{background:#fff}
.ic-crave{background:#1a1a2e}.ic-telus{background:#4b286d}.ic-appletv{background:#000}
.ic-sleeper{background:#2A2C38}.ic-yahoo{background:#400090}
.ic-nlm{background:#1c1c1e}.ic-oe{background:linear-gradient(150deg,#F0603A,#E0451C)}
.ic-nlm svg{width:40px;height:40px}.ic-oe svg{width:50px;height:50px}

.rl{flex:1;min-width:0}
.rl-t{font-size:22px;font-weight:600;color:var(--t1);letter-spacing:-.25px;line-height:1.2}
.rl-s{font-size:15px;color:var(--t3);margin-top:4px}
.chev{color:var(--line2);font-size:28px;font-weight:300}
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.muted{padding:40px;text-align:center;color:var(--t3)}
.col{display:flex;flex-direction:column;gap:20px}
.h-news{height:600px}.h-scores{height:340px}.h-sports{max-height:700px}

/* FEEDS */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s infinite ease-in-out}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.2)}}
.feed-box{background:var(--glass2);border:1px solid var(--line);border-radius:var(--r);overflow-y:auto;transition:all .3s cubic-bezier(.34,.69,.66,1)}
.feed-box::-webkit-scrollbar{width:6px}
.feed-box::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.feed-item{display:block;padding:20px 24px;border-bottom:1px solid var(--line);transition:all .2s cubic-bezier(.34,.69,.66,1);cursor:pointer}
.feed-item:last-child{border-bottom:none}
.feed-item:hover{background:var(--glass-hover)}
.feed-item:active{background:var(--surface2)}
.bookmark-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-left:1px solid var(--line);padding:0;cursor:pointer;transition:all .2s cubic-bezier(.34,.69,.66,1);flex-shrink:0;color:var(--t3)}
.bookmark-btn:hover{background:var(--surface);transform:scale(1.08);color:var(--t1)}
.bookmark-btn.saved{color:var(--accent)}
.bookmark-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5}
.feed-t{font-size:18px;font-weight:500;line-height:1.4;color:var(--t1);letter-spacing:-.3px}
.feed-m{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.feed-src{color:var(--accent)}
.news-tabs{margin-left:auto;display:flex;gap:6px}
.ntab{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:600;color:var(--t2);background:var(--surface);border:1px solid var(--line);text-transform:none;letter-spacing:0;transition:all .2s cubic-bezier(.34,.69,.66,1);cursor:pointer}
.ntab:hover{background:rgba(255,255,255,.1);color:var(--t1)}
.ntab.on{background:var(--t1);color:var(--bg);box-shadow:0 2px 8px rgba(255,255,255,.1)}
.ntab:not(.on):active{background:var(--surface2)}

/* CAPTURE */
.capbox{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:16px;color:var(--t1);font-family:var(--f);font-size:16px;line-height:1.6;padding:14px 16px;min-height:100px;resize:none;outline:none;transition:all .2s cubic-bezier(.34,.69,.66,1)}
.capbox:hover{border-color:var(--line2);background:rgba(255,255,255,.07)}
.capbox:focus{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 0 2px rgba(58,130,246,.2)}
.capbox::placeholder{color:var(--t3);opacity:.6}
.capbtns{display:flex;gap:14px;margin-top:16px}
.btn{padding:16px 28px;border-radius:100px;font-size:16px;font-weight:600;transition:all .2s cubic-bezier(.34,.69,.66,1);border:none;cursor:pointer;user-select:none}
.btn-pri{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(58,130,246,.25)}
.btn-pri:hover{box-shadow:0 6px 20px rgba(58,130,246,.35);transform:translateY(-2px)}
.btn-pri:active{transform:scale(.95)}
.btn-pri:disabled{opacity:.5;cursor:not-allowed}
.btn-gh{background:var(--surface);color:var(--t1);border:1px solid var(--line);transition:all .2s cubic-bezier(.34,.69,.66,1)}
.btn-gh:hover{background:var(--surface2);border-color:var(--line2)}
.btn-voice{margin-left:auto;display:flex;align-items:center;gap:8px;border:1px solid var(--line);color:var(--t1);padding:16px 20px;border-radius:100px;transition:all .2s cubic-bezier(.34,.69,.66,1)}
.btn-voice:hover{background:var(--surface);border-color:var(--line2)}
.btn-voice.rec{background:var(--red-bg);color:var(--red);border-color:var(--red);animation:rec-pulse 1.5s infinite}
@keyframes rec-pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* NOTES */
.noterow{display:flex;align-items:flex-start;gap:16px;padding:20px 24px;border-bottom:1px solid var(--line)}
.noterow:last-child{border-bottom:none}
.n-time{font-size:13px;color:var(--t3);font-weight:500;white-space:nowrap;padding-top:2px}
.n-txt{font-size:16px;color:var(--t1);line-height:1.6;flex:1}
.n-del{font-size:18px;color:var(--t3);padding:6px 8px;cursor:pointer;transition:all .2s cubic-bezier(.34,.69,.66,1);border-radius:6px}
.n-del:hover{background:rgba(255,69,58,.15);color:var(--red)}
.n-del:active{transform:scale(.95)}

/* CALCULATOR */
.calc-wrap{background:var(--glass2);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-bottom:28px;transition:all .3s cubic-bezier(.34,.69,.66,1)}
.calc-display{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 20px;margin-bottom:16px;text-align:right;min-height:70px;display:flex;flex-direction:column;justify-content:center}
.calc-expr{font-size:14px;color:var(--t3);min-height:18px}
.calc-val{font-size:36px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--t1);word-break:break-all}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.calc-key{padding:16px;border-radius:12px;font-size:18px;font-weight:600;text-align:center;transition:all .15s cubic-bezier(.34,.69,.66,1);border:1px solid var(--line);cursor:pointer}
.calc-key:hover{background:var(--surface2);border-color:var(--line2);transform:translateY(-1px)}
.calc-key:active{transform:scale(.95)}
.calc-num{background:var(--surface);color:var(--t1)}
.calc-op{background:rgba(58,130,246,.15);color:var(--accent);border-color:rgba(58,130,246,.2)}
.calc-fn{background:var(--surface2);color:var(--t2)}
.calc-eq{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(58,130,246,.3)}
.calc-zero{grid-column:span 2}

/* SCORE CARD */
.score-card{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.score-card:last-child{border-bottom:none}
.score-teams{flex:1}
.score-row{display:flex;justify-content:space-between;font-size:17px;font-weight:600;color:var(--t1);padding:3px 0}
.score-status{font-size:13px;font-weight:600;color:var(--accent);text-align:right;width:110px;margin-left:16px}

/* SETTINGS */
.set-group{background:var(--glass2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:28px;max-width:580px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transition:all .3s cubic-bezier(.34,.69,.66,1)}
.set-row{display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid var(--line);gap:16px}
.set-row:last-child{border-bottom:none}
.set-row.col-dir{flex-direction:column;align-items:flex-start}
.set-label{flex:1;min-width:0}
.set-t{font-size:19px;font-weight:600;color:var(--t1);letter-spacing:-.2px}
.set-s{font-size:14px;color:var(--t3);margin-top:3px}
.toggle{width:52px;height:32px;border-radius:100px;background:var(--surface2);position:relative;transition:all .3s cubic-bezier(.34,.69,.66,1);flex-shrink:0;border:1px solid var(--line);cursor:pointer}
.toggle:hover{border-color:var(--line2)}
.toggle.on{background:var(--green);border-color:var(--green)}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;transition:transform .3s cubic-bezier(.34,.69,.66,1);box-shadow:0 2px 6px rgba(0,0,0,.25)}
.toggle.on::after{transform:translateX(20px)}
.theme-presets{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;width:100%}
.theme-preset{padding:10px 12px;border:2px solid var(--line);border-radius:12px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s cubic-bezier(.34,.69,.66,1);background:var(--surface)}
.theme-preset:hover{border-color:var(--accent);background:var(--surface2);transform:translateY(-1px)}
.theme-preset.on{border-color:var(--accent);background:var(--accent);color:var(--bg);box-shadow:0 4px 12px rgba(58,130,246,.3)}
.color-picker-wrap{display:flex;align-items:center;gap:12px;width:100%}
input[type="color"]{width:50px;height:40px;border:1px solid var(--line);border-radius:8px;cursor:pointer;transition:all .2s cubic-bezier(.34,.69,.66,1)}
input[type="color"]:hover{border-color:var(--line2);box-shadow:0 2px 8px rgba(58,130,246,.15)}

/* STOCKS DROPDOWN */
#stocks-dropdown{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(16px) scale(.95);width:340px;background:var(--glass2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);z-index:150;opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.34,.69,.66,1);max-height:500px;display:flex;flex-direction:column}
#stocks-dropdown.open{transform:translateX(-50%) translateY(0) scale(1);opacity:1;pointer-events:auto}
.stocks-dropdown-header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;gap:8px}
.stocks-dropdown-header input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 12px;color:var(--t1);font-size:14px;font-family:var(--f);outline:none;transition:all .2s cubic-bezier(.34,.69,.66,1);text-transform:uppercase}
.stocks-dropdown-header input:hover{border-color:var(--line2);background:rgba(255,255,255,.08)}
.stocks-dropdown-header input:focus{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 0 2px rgba(58,130,246,.2)}
.stocks-dropdown-header button{padding:10px 14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s cubic-bezier(.34,.69,.66,1)}
.stocks-dropdown-header button:hover{box-shadow:0 4px 12px rgba(58,130,246,.35);transform:translateY(-2px)}
.stocks-dropdown-header button:active{transform:scale(.95)}
.stocks-dropdown-list{flex:1;overflow-y:auto;min-height:80px;max-height:350px}
.stocks-dropdown-list::-webkit-scrollbar{width:6px}
.stocks-dropdown-list::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line);font-size:14px;gap:8px;transition:all .15s cubic-bezier(.34,.69,.66,1);cursor:pointer}
.stock-item:hover{background:var(--glass-hover)}
.stock-item:last-child{border-bottom:none}
.stock-info{flex:1;min-width:0}
.stock-sym{font-weight:600;color:var(--t1);margin-bottom:2px}
.stock-px{color:var(--t2);font-size:12px}
.stock-chg{font-weight:600;min-width:50px;text-align:right}
.stock-chg.up{color:var(--green)}
.stock-chg.down{color:var(--red)}
.stock-remove{background:transparent;color:var(--t3);font-size:16px;padding:0;cursor:pointer;transition:color .2s ease;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.stock-remove:hover{color:var(--accent)}
.stocks-dropdown-footer{padding:10px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--t3);text-align:center;background:var(--surface)}

/* RESPONSIVE (phones / portrait) */
@media (max-width:760px){
  /* let the whole document scroll naturally instead of locking to an inner pane */
  html,body{height:auto;overflow:visible}
  #main{overflow:visible;flex:none}
  #header{padding:14px 18px;height:auto;flex-wrap:wrap;gap:8px 14px}
  #s-left,#s-right{gap:12px}
  #s-time{font-size:26px}#s-date{font-size:14px}
  #stock-widget{font-size:15px;padding-right:12px}#stock-widget .stk-label{font-size:13px}
  #weather-widget{font-size:18px}.w-icon{font-size:22px}
  #main{padding:8px 16px 110px}
  .split{grid-template-columns:1fr}
  .rl-t{font-size:19px}.appicon{width:48px;height:48px}.appicon svg{width:28px;height:28px}
  /* let feeds flow with the page on phones — avoids nested-scroll burying the scores/calculator */
  .h-news,.h-scores,.h-sports{height:auto;max-height:none}
  .feed-box{overflow:visible}
  #dock{gap:6px;padding:10px 14px}.dock-btn{padding:10px 16px;font-size:15px}
}
</style>
</head>
