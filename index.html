<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard</title>
    <style>
        :root {
            --bg: #04050a;
            --surface: rgba(255,255,255,0.025);
            --line: rgba(255,255,255,0.06);
            --text: #f3f6fc;
            --text-secondary: #97a2b6;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 620px;
            margin: 0 auto;
        }
        
        .section {
            padding: 24px 8px 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        
        .row {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            margin-bottom: 10px;
            text-decoration: none;
            color: var(--text);
        }
        
        .row:active {
            background: rgba(255,255,255,0.06);
            transform: scale(0.985);
        }
        
        .appicon {
            width: 52px; height: 52px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-right: 18px; flex-shrink: 0;
        }
        
        .rl { flex: 1; }
        .rl-t { font-size: 18px; font-weight: 600; }
        .rl-s { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }
        
        .chev { font-size: 24px; color: var(--text-secondary); }
        
        .home-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #E82127; color: white;
            width: 58px; height: 58px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 4px 20px rgba(232, 33, 39, 0.4);
            z-index: 1000; text-decoration: none;
        }
        
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .dash-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px;
        }
        
        .dash-card h4 {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .dash-value {
            font-size: 22px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Live Dashboard -->
    <div class="section">Live Dashboard — Clayton Heights</div>
    
    <div class="dash-grid">
        <div class="dash-card">
            <h4>🌤 Weather</h4>
            <div class="dash-value">14°C</div>
            <div style="font-size:13px; color:#aaa;">Partly cloudy • Feels 11°</div>
        </div>
        <div class="dash-card">
            <h4>🚗 Traffic</h4>
            <div class="dash-value" style="color:#ffaa00;">2 incidents</div>
            <div style="font-size:13px;">King George • Hwy 1</div>
        </div>
        <div class="dash-card">
            <h4>⛽ Gas</h4>
            <div class="dash-value">158.9¢</div>
            <div style="font-size:13px; color:#aaa;">Surrey</div>
        </div>
        <div class="dash-card">
            <h4>🌬 AQHI</h4>
            <div class="dash-value" style="color:#4ade80;">2</div>
            <div style="font-size:13px; color:#aaa;">Good</div>
        </div>
    </div>

    <!-- Messaging -->
    <div class="section">Messaging</div>
    
    <a class="row" href="https://web.whatsapp.com" target="_blank">
        <div class="appicon" style="background: linear-gradient(150deg,#25D366,#128C7E);">
            <span style="color:white; font-size:26px;">💬</span>
        </div>
        <div class="rl">
            <div class="rl-t">WhatsApp</div>
            <div class="rl-s">Open chats</div>
        </div>
        <span class="chev">›</span>
    </a>

    <!-- Email -->
    <div class="section">Email</div>
    
    <a class="row" href="https://mail.google.com" target="_blank">
        <div class="appicon" style="background:white;">
            <span style="color:#EA4335; font-size:26px; font-weight:700;">G</span>
        </div>
        <div class="rl">
            <div class="rl-t">Gmail</div>
            <div class="rl-s">Open inbox</div>
        </div>
        <span class="chev">›</span>
    </a>

    <!-- Productivity -->
    <div class="section">Productivity</div>
    
    <a class="row" href="https://www.icloud.com/notes" target="_blank">
        <div class="appicon" style="background: linear-gradient(150deg,#FFE434,#FFB800);">
            <span style="color:black; font-size:24px;">📝</span>
        </div>
        <div class="rl">
            <div class="rl-t">Notes</div>
            <div class="rl-s">iCloud Notes</div>
        </div>
        <span class="chev">›</span>
    </a>

    <!-- Storage -->
    <div class="section">Storage</div>
    
    <a class="row" href="https://www.icloud.com/iclouddrive" target="_blank">
        <div class="appicon" style="background: linear-gradient(150deg,#70D4FF,#1A9EFF);">
            <span style="color:white; font-size:24px;">☁️</span>
        </div>
        <div class="rl">
            <div class="rl-t">iCloud Drive</div>
            <div class="rl-s">Files</div>
        </div>
        <span class="chev">›</span>
    </a>

    <a href="#" class="home-btn" onclick="window.location.reload(); return false;">🏠</a>

</body>
</html>
